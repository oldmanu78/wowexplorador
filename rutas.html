    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {

      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────── */
    .header {
      background: rgba(0,0,0,0.85);
      border-bottom: 2px solid var(--gold);
      padding: 28px 20px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .header h1 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 2em;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(248,183,0,0.4);
    }
    .header .sub { color: var(--text-muted); font-size: 0.85em; margin-top: 6px; }

    /* ── NAV ─────────────────────────────────── */
    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      flex-wrap: wrap;
    }
    .nav a {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.82em;
      border: 1px solid rgba(248,183,0,0.4);
      padding: 5px 14px;
      border-radius: 4px;
      transition: background 0.2s;
      font-family: 'Cinzel', serif;
    }
    .nav a:hover { background: rgba(248,183,0,0.12); }

    /* ── DUNGEON TABS ────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 6px;
      padding: 20px 30px 0;
      max-width: 1300px;
      margin: 0 auto;
      flex-wrap: wrap;
    }
    .tab-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Nunito', sans-serif;
      font-size: 0.78em;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: none;
    }
    .tab-btn:hover { color: var(--text); background: var(--bg-card2); }
    .tab-btn.active {
      color: var(--gold);
      background: var(--bg-card2);
      border-color: var(--gold);
      border-bottom-color: var(--bg-card2);
    }
    .tab-btn .type-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-new { background: var(--new-color); }
    .dot-classic { background: var(--classic-color); }

    /* ── MAIN CONTENT ───────────────────────── */
    .content {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 30px 40px;
    }
    .dungeon-panel { display: none; }
    .dungeon-panel.active { display: block; }

    .dungeon-card {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 8px 8px 8px;
      overflow: hidden;
    }

    /* ── DUNGEON HERO ───────────────────────── */
    .dungeon-hero {
      display: flex;
      gap: 0;
      min-height: 200px;
      position: relative;
      overflow: hidden;
    }
    .dungeon-img {
      width: 340px;
      flex-shrink: 0;
      object-fit: cover;
      display: block;
      filter: brightness(0.85);
    }
    .dungeon-img-placeholder {
      width: 340px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #1a1a2e, #2a1a3e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4em;
    }
    .dungeon-info {
      flex: 1;
      padding: 28px 30px;
      background: linear-gradient(90deg, rgba(22,22,31,0.0) 0%, var(--bg-card2) 30%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
    }
    .dungeon-name {
      font-family: 'Cinzel', serif;
      font-size: 1.6em;
      color: #fff;
      line-height: 1.2;
    }
    .dungeon-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 0.72em;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .badge-new { background: rgba(0,200,255,0.15); color: var(--new-color); border: 1px solid rgba(0,200,255,0.3); }
    .badge-classic { background: rgba(167,139,250,0.15); color: var(--classic-color); border: 1px solid rgba(167,139,250,0.3); }
    .badge-bosses { background: rgba(248,183,0,0.1); color: var(--gold); border: 1px solid rgba(248,183,0,0.25); }
    .badge-timer { background: rgba(255,255,255,0.06); color: #aaa; border: 1px solid rgba(255,255,255,0.12); }

    .dungeon-desc {
      font-size: 0.87em;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 560px;
    }

    .section-label {
      padding: 18px 28px 10px;
      font-family: 'Cinzel', serif;
      font-size: 0.78em;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── ROUTES GRID ────────────────────────── */
    .routes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 16px;
      padding: 0 28px 28px;
    }

    .route-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .route-card:hover { transform: translateY(-3px); border-color: #444; }
    .route-card.pug { border-top: 3px solid var(--pug-color); }
    .route-card.high { border-top: 3px solid var(--high-color); }

    .route-thumb {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: block;
      background: #0d0d18;
    }
    .route-thumb-placeholder {
      width: 100%;
      height: 130px;
      background: linear-gradient(135deg, #0d0d18, #1a1a2e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 2em;
    }

    .route-body { padding: 14px 16px; }
    .route-type {
      font-size: 0.68em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;

    .type-pug { color: var(--pug-color); }
    .type-high { color: var(--high-color); }

      font-size: 0.92em;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .route-desc {
      font-size: 0.78em;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 12px;

      flex-wrap: wrap;

      font-size: 0.75em;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;

</head>

// ══════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════
function buildPage() {
  const tabBar = document.getElementById('tabBar');
  const content = document.getElementById('content');

  DUNGEONS.forEach((d, idx) => {
    // Tab button
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
    btn.dataset.idx = idx;
    btn.innerHTML = `
      <span class="type-dot ${d.tipo === 'nueva' ? 'dot-new' : 'dot-classic'}"></span>
      ${d.sigla}
    `;
    btn.title = d.nombre;
    btn.addEventListener('click', () => switchTab(idx));
    tabBar.appendChild(btn);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'dungeon-panel' + (idx === 0 ? ' active' : '');
    panel.id = `panel-${idx}`;

    const routesHTML = d.rutas.map(r => `
      <div class="route-card ${r.tipo}">
        ${r.thumb
          ? `<img class="route-thumb" src="${r.thumb}" alt="${r.titulo}" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="route-thumb-placeholder">🗺️</div>`
        }
        <div class="route-body">
          <div class="route-type ${r.tipo === 'pug' ? 'type-pug' : 'type-high'}">
            ${r.tipo === 'pug' ? '✦ PUG Friendly' : '◆ Alta Clave'}
          </div>
          <div class="route-title">${r.titulo}</div>
          <div class="route-desc">${r.desc}</div>
          <div class="route-actions">
            <a class="btn-route btn-kg" href="${r.kg_url}" target="_blank">
              🗝 Keystone.guru ↗
            </a>
          </div>
        </div>
      </div>
    `).join('');

    panel.innerHTML = `
      <div class="dungeon-card">
        <div class="dungeon-hero">
          <img class="dungeon-img" src="${d.img}" alt="${d.nombre}"
            onerror="this.outerHTML='<div class=\'dungeon-img-placeholder\'>🏰</div>'">
          <div class="dungeon-info">
            <div class="dungeon-name">${d.nombre}</div>
            <div class="dungeon-meta">
              <span class="badge ${d.tipo === 'nueva' ? 'badge-new' : 'badge-classic'}">
                ${d.tipo === 'nueva' ? '✦ Nueva' : '⟳ Clásica Renovada'}
              </span>
              <span class="badge badge-bosses">⚔ ${d.jefes} Jefes</span>
              <span class="badge badge-timer">⏱ ${d.timer}</span>
              <span class="badge badge-timer">📍 ${d.zona}</span>
            </div>
            <div class="dungeon-desc">${d.desc}</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
              <a class="btn-route btn-guide" href="${d.guia_method}" target="_blank">Method.gg ↗</a>
              <a class="btn-route btn-guide" href="${d.guia_icy}" target="_blank">Icy-Veins ↗</a>
            </div>
          </div>
        </div>

        <div class="section-label">Rutas de la Temporada</div>
        <div class="routes-grid">${routesHTML}</div>
      </div>
    `;

    content.appendChild(panel);
  });
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', i === idx));
  document.querySelectorAll('.dungeon-panel').forEach((p,i) =>
    p.classList.toggle('active', i === idx));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildPage();
</script>
