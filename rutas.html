<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoW Explorador - Rutas Mythic+</title>
  <link rel="stylesheet" href="css/fonts.css">
  <style>

    :root {
      --gold: #F8B700;
      --gold-dim: #c49000;
      --bg-deep: #080810;
      --bg-card: #111118;
      --bg-card2: #16161f;
      --border: #2a2a3a;
      --text: #d8d8e8;
      --text-muted: #6a6a88;
      --new-color: #00c8ff;
      --classic-color: #a78bfa;
      --pug-color: #4ade80;
      --high-color: #f97316;
      --shadow-soft: 0 4px 20px rgba(0,0,0,0.4);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.6);
      --glow-gold: 0 0 20px rgba(248,183,0,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────── */
    .header {
      background: rgba(0,0,0,0.85);
      border-bottom: 2px solid var(--gold);
      padding: 28px 20px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }
    .header h1 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 2em;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(248,183,0,0.4);
    }
    .header .sub { color: var(--text-muted); font-size: 0.85em; margin-top: 6px; }

    /* ── NAV ─────────────────────────────────── */
    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      flex-wrap: wrap;
    }
    .nav a {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.82em;
      border: 1px solid rgba(248,183,0,0.4);
      padding: 5px 14px;
      border-radius: 4px;
      transition: background 0.2s;
      font-family: 'Cinzel', serif;
    }
    .nav a:hover { background: rgba(248,183,0,0.12); }

    /* ── DUNGEON TABS ────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 6px;
      padding: 20px 30px 0;
      max-width: 1300px;
      margin: 0 auto;
      flex-wrap: wrap;
    }
    .tab-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Nunito', sans-serif;
      font-size: 0.78em;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: none;
    }
    .tab-btn:hover { color: var(--text); background: var(--bg-card2); transform: translateY(-2px); }
    .tab-btn.active {
      color: var(--gold);
      background: var(--bg-card2);
      border-color: var(--gold);
      border-bottom-color: var(--bg-card2);
      box-shadow: var(--glow-gold);
      transform: translateY(-2px);
    }
    .tab-btn .type-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-new { background: var(--new-color); }
    .dot-classic { background: var(--classic-color); }

    /* ── MAIN CONTENT ───────────────────────── */
    .content {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 30px 40px;
    }
    .dungeon-panel { display: none; }
    .dungeon-panel.active { display: block; }

    .dungeon-card {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 8px 8px 8px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .dungeon-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    /* ── DUNGEON HERO ───────────────────────── */
    .dungeon-hero {
      display: flex;
      gap: 0;
      min-height: 200px;
      position: relative;
      overflow: hidden;
    }
    .dungeon-img {
      width: 340px;
      flex-shrink: 0;
      object-fit: cover;
      display: block;
      filter: brightness(0.85);
    }
    .dungeon-img-placeholder {
      width: 340px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #1a1a2e, #2a1a3e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4em;
    }
    .dungeon-info {
      flex: 1;
      padding: 28px 30px;
      background: linear-gradient(90deg, rgba(22,22,31,0.0) 0%, var(--bg-card2) 30%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
    }
    .dungeon-name {
      font-family: 'Cinzel', serif;
      font-size: 1.6em;
      color: #fff;
      line-height: 1.2;
    }
    .dungeon-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 0.72em;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .badge-new { background: rgba(0,200,255,0.15); color: var(--new-color); border: 1px solid rgba(0,200,255,0.3); }
    .badge-classic { background: rgba(167,139,250,0.15); color: var(--classic-color); border: 1px solid rgba(167,139,250,0.3); }
    .badge-bosses { background: rgba(248,183,0,0.1); color: var(--gold); border: 1px solid rgba(248,183,0,0.25); }
    .badge-timer { background: rgba(255,255,255,0.06); color: #aaa; border: 1px solid rgba(255,255,255,0.12); }

    .dungeon-desc {
      font-size: 0.87em;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 560px;
    }

    /* ── SECTION HEADER ─────────────────────── */
    .section-label {
      padding: 18px 28px 10px;
      font-family: 'Cinzel', serif;
      font-size: 0.78em;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── ROUTES GRID ────────────────────────── */
    .routes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 16px;
      padding: 0 28px 28px;
    }

    .route-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .route-card:hover { 
      transform: translateY(-3px); 
      border-color: #444; 
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    .route-card.pug { border-top: 3px solid var(--pug-color); }
    .route-card.high { border-top: 3px solid var(--high-color); }

    .route-thumb {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: block;
      background: #0d0d18;
    }
    .route-thumb-placeholder {
      width: 100%;
      height: 130px;
      background: linear-gradient(135deg, #0d0d18, #1a1a2e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 2em;
    }

    .route-body { padding: 14px 16px; }
    .route-type {
      font-size: 0.68em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .type-pug { color: var(--pug-color); }
    .type-high { color: var(--high-color); }

    .route-title {
      font-size: 0.92em;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .route-desc {
      font-size: 0.78em;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .route-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-route {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75em;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid;
    }
    .btn-kg {
      background: rgba(248,183,0,0.1);
      border-color: rgba(248,183,0,0.4);
      color: var(--gold);
    }
    .btn-kg:hover { background: rgba(248,183,0,0.2); }
    .btn-guide {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.15);
      color: #aaa;
    }
    .btn-guide:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* ── POPULAR ROWS ──────────────────────── */
    .popular-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s;
    }
    .popular-row:hover { border-color: var(--gold); background: rgba(248,183,0,0.04); }
    .popular-rank {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 1em;
      min-width: 28px;
      font-weight: 700;
    }
    .popular-name { font-size: 0.88em; flex: 1; }
    .popular-ext { color: var(--text-muted); font-size: 0.74em; white-space: nowrap; }

    /* ── FOOTER ─────────────────────────────── */
    .page-footer {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.75em;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }
    .page-footer a { color: var(--gold); text-decoration: none; }

    /* ── RESPONSIVE ─────────────────────────── */
    @media (max-width: 700px) {
      .dungeon-hero { flex-direction: column; }
      .dungeon-img, .dungeon-img-placeholder { width: 100%; height: 160px; }
      .dungeon-info { background: var(--bg-card2); }
      .tab-bar { padding: 16px 16px 0; }
      .content { padding: 0 16px 30px; }
      .routes-grid { padding: 0 16px 20px; gap: 12px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>⚔ Rutas Mythic+</h1>
  <div class="sub">Midnight Season 1 · 8 Mazmorras · Rutas desde Keystone.guru</div>
</div>

<div class="nav">
  <a href="index.html">← Panel Semanal</a>
  <a href="personajes.html">👤 Personajes</a>
  <a href="https://keystone.guru/routes/expansion/midnight" target="_blank">Ver todas en Keystone.guru ↗</a>
</div>

<!-- ═══════════════════════════════════════════ DUNGEON TABS -->
<div style="padding: 16px 30px 0; max-width: 1300px; margin: 0 auto;">
  <input type="text" id="buscador" placeholder="🔍 Buscar mazmorra..." 
    style="width: 100%; padding: 10px 16px; border-radius: 6px; border: 1px solid var(--border); 
           background: var(--bg-card); color: var(--text); font-size: 0.9em;
           outline: none; transition: border-color 0.2s;"
    onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='var(--border)'">
</div>
<div class="tab-bar" id="tabBar"></div>

<!-- ═══════════════════════════════════════════ PANELS -->
<div class="content" id="content">
  <div style="text-align:center;padding:60px 20px;color:var(--text-muted)">
    <div style="font-size:2em;margin-bottom:12px;">🗺️</div>
    <p>Cargando mazmorras...</p>
  </div>
</div>

<div class="page-footer">
  Rutas obtenidas de <a href="https://keystone.guru" target="_blank">Keystone.guru</a> ·
  Guías en <a href="https://www.method.gg" target="_blank">Method.gg</a> y
  <a href="https://www.icy-veins.com" target="_blank">Icy-Veins</a> ·
  WoW Explorador no está afiliado con Blizzard Entertainment
</div>

<script>
// Las rutas se cargan desde datos.json (generado por actualizar_datos.py)
// Esto elimina la duplicación — la fuente única es actualizar_datos.py

// ══════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════
function buildPage(dungeons) {
  const tabBar = document.getElementById('tabBar');
  const content = document.getElementById('content');
  
  // Limpiar contenido previo
  tabBar.innerHTML = '';
  content.innerHTML = '';

  dungeons.forEach((d, idx) => {
    // Tab button
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
    btn.dataset.idx = idx;
    btn.innerHTML = `
      <span class="type-dot ${d.tipo === 'nueva' ? 'dot-new' : 'dot-classic'}"></span>
      ${d.sigla}
    `;
    btn.title = d.nombre;
    btn.addEventListener('click', () => switchTab(idx));
    tabBar.appendChild(btn);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'dungeon-panel' + (idx === 0 ? ' active' : '');
    panel.id = `panel-${idx}`;

    const routesHTML = (d.rutas || []).map(r => `
      <div class="route-card ${r.tipo}">
        ${r.thumb
          ? `<img class="route-thumb" src="${r.thumb}" alt="${r.nombre}" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="route-thumb-placeholder">🗺️</div>`
        }
        <div class="route-body">
          <div class="route-type ${r.tipo === 'pug' ? 'type-pug' : 'type-high'}">
            ${r.tipo === 'pug' ? '✦ PUG Friendly' : '◆ Alta Clave'}
          </div>
          <div class="route-title">${r.nombre}</div>
          <div class="route-desc">${r.desc}</div>
          <div class="route-actions">
            <a class="btn-route btn-kg" href="${r.url}" target="_blank">
              🗝 Keystone.guru ↗
            </a>
          </div>
        </div>
      </div>
    `).join('');

    panel.innerHTML = `
      <div class="dungeon-card">
        <div class="dungeon-hero">
          <img class="dungeon-img" src="${d.img}" alt="${d.nombre}"
            onerror="this.outerHTML='<div class=\'dungeon-img-placeholder\'>🏰</div>'">
          <div class="dungeon-info">
            <div class="dungeon-name">${d.nombre}</div>
            <div class="dungeon-meta">
              <span class="badge ${d.tipo === 'nueva' ? 'badge-new' : 'badge-classic'}">
                ${d.tipo === 'nueva' ? '✦ Nueva' : '⟳ Clásica Renovada'}
              </span>
              <span class="badge badge-bosses">⚔ ${d.jefes} Jefes</span>
              <span class="badge badge-timer">⏱ ${d.timer}</span>
              <span class="badge badge-timer">📍 ${d.zona}</span>
            </div>
            <div class="dungeon-desc">${d.desc}</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
              <a class="btn-route btn-guide" href="${d.guia_method}" target="_blank">Method.gg ↗</a>
              <a class="btn-route btn-guide" href="${d.guia_icy}" target="_blank">Icy-Veins ↗</a>
            </div>
          </div>
        </div>

        <div class="section-label">Rutas de la Temporada</div>
        <div class="routes-grid">${routesHTML}</div>
      </div>
    `;

    content.appendChild(panel);
  });
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', i === idx));
  document.querySelectorAll('.dungeon-panel').forEach((p,i) =>
    p.classList.toggle('active', i === idx));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Buscador de mazmorras
document.getElementById('buscador').addEventListener('input', function(e) {
  const term = e.target.value.toLowerCase();
  document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
    const nombre = btn.textContent.toLowerCase();
    btn.style.display = nombre.includes(term) ? 'flex' : 'none';
    // Ocultar panel también si está activo
    const panel = document.getElementById('panel-' + idx);
    if (!nombre.includes(term)) {
      panel.classList.remove('active');
    }
  });
});

async function cargarDatos() {
  const content = document.getElementById('content');
  try {
    const res = await fetch('datos.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const datos = await res.json();
    if (!datos.mazmorras) throw new Error('datos.json no contiene mazmorras');

    // Construir array de mazmorras desde datos.json (fuente única)
    const dungeons = Object.entries(datos.mazmorras).map(([id, meta]) => ({
      ...meta,
      id: id,
      rutas: datos.rutas[id] || []
    }));

    // Renderizar página
    buildPage(dungeons);

    // Mostrar fecha de actualización
    if (datos.actualizado) {
      const sub = document.querySelector('.header .sub');
      if (sub) sub.textContent += ' · Actualizado: ' + datos.actualizado;
    }

    // Agregar sección de rutas populares desde datos.json
    if (datos.rutas) {
      Object.entries(datos.rutas).forEach(([dungeonId, rutasData]) => {
        if (!rutasData || rutasData.length === 0) return;
        // Encontrar el panel que corresponde a este dungeon
        const idx = dungeons.findIndex(d => d.id === dungeonId);
        if (idx === -1) return;
        const panel = document.getElementById('panel-' + idx);
        if (!panel) return;
        const grid = panel.querySelector('.routes-grid');
        if (!grid) return;

        const popular = document.createElement('div');
        popular.style.cssText = 'padding: 0 28px 20px;';

        const items = rutasData.map((r, i) => `
          <a href="${r.url}" target="_blank" rel="noopener" class="popular-row">
            <span class="popular-rank">#${i + 1}</span>
            <span class="popular-name">${r.nombre}</span>
            <span class="popular-ext">Keystone.guru ↗</span>
          </a>
        `).join('');

        popular.innerHTML = `
          <div class="section-label" style="border-top:none;padding-top:18px;">
            🔥 Más populares esta semana
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;">${items}</div>
        `;

        grid.parentNode.insertBefore(popular, grid);
      });
    }
  } catch(e) {
    console.error('Error cargando datos:', e);
    content.innerHTML = `
      <div style="text-align:center;padding:80px 20px;color:var(--text-muted)">
        <div style="font-size:3em;margin-bottom:16px;">⚠️</div>
        <p style="font-size:1.1em;margin-bottom:8px;color:var(--text)">No se pudieron cargar las mazmorras.</p>
        <p style="font-size:.85em;">Verifica que datos.json exista o ejecuta actualizar_datos.py</p>
        <button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:var(--gold);color:#000;border:none;border-radius:4px;cursor:pointer;font-weight:600;">Reintentar</button>
      </div>`;
  }
}

cargarDatos();

</script>
</body>
</html>
